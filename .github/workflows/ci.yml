name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: blacksmith-4vcpu-ubuntu-2404
    # Pin to bash so `${PIPESTATUS[0]}` (a bash-only array) in the Build and
    # Run tests steps is guaranteed — GitHub Actions defaults to bash on Linux
    # in practice, but making it explicit avoids silent breakage if the
    # default ever shifts.
    defaults:
      run:
        shell: bash
    env:
      # Single source for the compiler version: setup-ocaml's switch and the
      # self-heal rebuild in Install dependencies must agree.
      OCAML_COMPILER: '5.4.1'
    steps:
      - uses: useblacksmith/checkout@41cdeedae8edb2e684ba22896a5fd2a3cb85db6b # v4 (Blacksmith fork)

      # Persist the local switch across runs on a Blacksmith sticky disk.
      # actions/cache was unusable for [_opam/]: it freezes the first entry
      # per key, so one half-consistent save (e.g. from a cancel-in-progress
      # run) poisoned every later run ("zarith ... META already exists") until
      # manually evicted. A sticky disk is mutable, last-write-wins storage:
      # a bad state is overwritten by the next good run, and the guard steps
      # below wipe stale state in ways that also persist — self-healing
      # instead of self-poisoning.
      - name: Mount opam switch cache
        uses: useblacksmith/stickydisk@13af8883542ca949a717e70fef89d15edbb29d88 # v1
        with:
          path: ${{ github.workspace }}/_opam
          # Stable key (no *.opam hash): stickydisk has no restore-keys, so a
          # hashed key would go cold on every dependency bump. opam reconciles
          # the switch against *.opam on install, fetching only what changed.
          key: ${{ github.repository }}-opam-build-${{ runner.os }}

      # Guard 1: half-written switch. The marker is deleted here and recreated
      # only after a successful install, so a run interrupted anywhere in
      # between — including inside setup-ocaml's switch creation — leaves no
      # marker, and the next run starts from an empty switch instead of
      # letting setup-ocaml trip over partial files.
      - name: Reset switch cache unless last run completed
        run: |
          if [ ! -f _opam/.ci-switch-ok ]; then
            echo "No completion marker — clearing cached switch"
            find _opam -mindepth 1 -delete
          fi
          rm -f _opam/.ci-switch-ok

      # setup-ocaml still caches its opam-root state at [~/.opam/] (compiler
      # + repo metadata) via actions/cache, keyed separately from the sticky
      # disk — Guard 2 below handles the two drifting apart. [dune-cache:
      # true] covers recompilation, and the opam.ocaml.org archive mirror
      # keeps source fetches fast.
      - uses: ocaml/setup-ocaml@e32b06a3e831ff2fbc6f08cf35be2085e3918014 # v3.6.1
        with:
          ocaml-compiler: ${{ env.OCAML_COMPILER }}
          dune-cache: true

      - name: Use opam.ocaml.org archive cache
        # erratique.ch (upstream for cmdliner, mtime, fpath, logs, uutf, ...)
        # is frequently flaky; the community cache mirrors opam-repository
        # archives behind a CDN, so opam only falls back to upstream on a miss.
        run: opam option 'archive-mirrors=["https://opam.ocaml.org/cache"]'

      - name: Install dependencies
        # Guard 2: switch/root drift. A cached [_opam/] paired with a fresh
        # [~/.opam/] (setup-ocaml cache miss) makes opam treat the switch as
        # new and reinstall packages over files that already exist on disk —
        # the historical "zarith ... META already exists" failure. On any
        # install failure, rebuild the switch from scratch and retry once; the
        # wipe lands on the sticky disk, so the heal persists. `find -delete`
        # (not `rm -rf _opam`) because _opam is the mount point itself.
        run: |
          if ! opam install . --deps-only --with-test -y; then
            echo "::warning::opam install failed — wiping cached _opam and rebuilding the switch"
            opam switch remove "$PWD" -y || true
            find _opam -mindepth 1 -delete
            opam switch create . "$OCAML_COMPILER" --no-install -y
            opam install . --deps-only --with-test -y
          fi
          touch _opam/.ci-switch-ok

      - name: Build
        id: build
        run: |
          opam exec -- dune build 2>&1 | tee build.log
          exit "${PIPESTATUS[0]}"

      - name: Annotate build errors
        if: failure() && steps.build.outcome == 'failure'
        run: |
          # Parse OCaml compiler errors into GitHub annotations
          python3 -c "
          import re, sys
          log = open('build.log').read()
          # Match: File \"path\", line N, characters C-C:
          for m in re.finditer(r'File \"([^\"]+)\", line (\d+), characters (\d+)-\d+:\n(.*?)(?=\nFile |\Z)', log, re.DOTALL):
              f, line, col, msg = m.groups()
              msg = msg.strip().replace('\n', ' ')
              level = 'error' if 'Error' in msg else 'warning'
              print(f'::{level} file={f},line={line},col={col}::{msg}')
          "

      - name: Run tests
        # Single invocation — the runtest alias covers unit, expect, inline,
        # and QCheck property tests, so a separate `--force` re-run would just
        # repeat the entire suite. QCHECK_COUNT raises iteration depth for the
        # property tests; non-property tests ignore it.
        run: |
          opam exec -- dune runtest 2>&1 | tee test.log
          exit "${PIPESTATUS[0]}"
        env:
          QCHECK_COUNT: "10000"

      - name: Annotate test failures
        if: failure() && hashFiles('test.log') != ''
        run: |
          python3 -c "
          import re
          log = open('test.log').read()
          for m in re.finditer(r'File \"([^\"]+)\", line (\d+).*?:\s*(.*?FAILED.*)', log):
              f, line, msg = m.groups()
              print(f'::error file={f},line={line}::{msg.strip()}')
          for m in re.finditer(r'FAIL\s+(.+?)\s+in\s+(\S+)\s+at\s+line\s+(\d+)', log):
              name, f, line = m.groups()
              print(f'::error file={f},line={line}::Test failed: {name}')
          "

  format:
    name: Format Check
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: useblacksmith/checkout@41cdeedae8edb2e684ba22896a5fd2a3cb85db6b # v4 (Blacksmith fork)

      # No sticky disk for [_opam/] here, unlike build-and-test: this job's
      # switch install happens inside the lint-fmt action (a `uses:` step we
      # can't wrap in a wipe-and-retry guard), so a stale cached switch would
      # wedge CI red until someone manually cleared the disk — the same
      # poisoning failure mode ("zarith ... META already exists") that got
      # [_opam/] caching removed in the first place. The switch here is tiny
      # (ocamlformat only); [dune-cache: true] plus the archive mirror cover
      # the speed win.
      - uses: ocaml/setup-ocaml@e32b06a3e831ff2fbc6f08cf35be2085e3918014 # v3.6.1
        with:
          ocaml-compiler: '5.4.1'
          dune-cache: true

      - name: Use opam.ocaml.org archive cache
        run: opam option 'archive-mirrors=["https://opam.ocaml.org/cache"]'

      - uses: ocaml/setup-ocaml/lint-fmt@e32b06a3e831ff2fbc6f08cf35be2085e3918014 # v3.6.1

  shell-lint:
    name: Shell Lint & Format
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      SHFMT_VERSION: v3.13.1
      # 2-space indent + case-item indent matches the existing scripts/ style.
      SHFMT_FLAGS: "-i 2 -ci"
    steps:
      - uses: useblacksmith/checkout@41cdeedae8edb2e684ba22896a5fd2a3cb85db6b # v4 (Blacksmith fork)

      - name: Discover shell scripts
        id: discover
        # Match by extension *and* by shebang so files like git hooks or
        # scripts without a `.sh` suffix still get checked. `git ls-files -z`
        # respects .gitignore and avoids globbing surprises.
        run: |
          set -euo pipefail
          # `if … fi` (not `&&`) so a non-matching grep doesn't fail the
          # subshell under `set -e` and abort the whole pipeline.
          {
            git ls-files -z '*.sh' '*.bash'
            git ls-files -z | while IFS= read -r -d '' f; do
              [ -f "$f" ] || continue
              case "$f" in *.sh|*.bash) continue ;; esac
              # Only read the first line; skip binaries and large files cheaply.
              if head -c 128 -- "$f" 2>/dev/null | head -n 1 \
                  | grep -Eq '^#![[:space:]]*((/usr/bin/env[[:space:]]+)?|/usr/bin/|/bin/)(bash|dash|ksh|sh)([[:space:]]|$)'; then
                printf '%s\0' "$f"
              fi
            done
          } | sort -zu | tee "$RUNNER_TEMP/shell-files.nul" >/dev/null
          count=$(tr -cd '\0' < "$RUNNER_TEMP/shell-files.nul" | wc -c | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Discovered $count shell script(s):"
          tr '\0' '\n' < "$RUNNER_TEMP/shell-files.nul"

      - name: Install shfmt
        if: steps.discover.outputs.count != '0'
        # Checksums pin the exact binary for SHFMT_VERSION; bumping the version
        # requires regenerating both. Computed via:
        #   sha256sum shfmt_v3.13.1_linux_{amd64,arm64}
        env:
          SHFMT_SHA256_LINUX_AMD64: fb096c5d1ac6beabbdbaa2874d025badb03ee07929f0c9ff67563ce8c75398b1
          SHFMT_SHA256_LINUX_ARM64: 32d92acaa5cd8abb29fc49dac123dc412442d5713967819d8af2c29f1b3857c7
        run: |
          set -euo pipefail
          arch=$(uname -m)
          case "$arch" in
            x86_64)  shfmt_arch="linux_amd64"; expected_sha="$SHFMT_SHA256_LINUX_AMD64" ;;
            aarch64) shfmt_arch="linux_arm64"; expected_sha="$SHFMT_SHA256_LINUX_ARM64" ;;
            *) echo "Unsupported architecture: $arch" >&2; exit 1 ;;
          esac
          curl -fsSL -o "$RUNNER_TEMP/shfmt" \
            "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_${shfmt_arch}"
          echo "${expected_sha}  ${RUNNER_TEMP}/shfmt" | sha256sum -c -
          chmod +x "$RUNNER_TEMP/shfmt"
          sudo mv "$RUNNER_TEMP/shfmt" /usr/local/bin/shfmt
          shfmt --version

      - name: shellcheck
        if: steps.discover.outputs.count != '0'
        run: |
          set -euo pipefail
          shellcheck --version
          xargs -0 shellcheck < "$RUNNER_TEMP/shell-files.nul"

      - name: shfmt --diff
        if: steps.discover.outputs.count != '0'
        run: |
          set -euo pipefail
          # shellcheck disable=SC2086 # SHFMT_FLAGS intentionally word-splits
          xargs -0 shfmt $SHFMT_FLAGS -d < "$RUNNER_TEMP/shell-files.nul"

  lint-yojson:
    name: No raw Yojson.Safe.Util
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: useblacksmith/checkout@41cdeedae8edb2e684ba22896a5fd2a3cb85db6b # v4 (Blacksmith fork)
        with:
          persist-credentials: false

      # Guards against new partial-accessor (member/to_string/to_*) call sites
      # creeping back in outside lib_core/json.ml. See the script header and
      # scripts/yojson-util-allowlist.txt.
      - name: check-no-raw-yojson
        run: bash scripts/check-no-raw-yojson.sh
