name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5.4.0'
          dune-cache: true

      - name: Install dependencies
        run: opam install . --deps-only --with-test -y

      - name: Build
        id: build
        run: |
          opam exec -- dune build 2>&1 | tee build.log
          exit ${PIPESTATUS[0]}

      - name: Annotate build errors
        if: failure() && steps.build.outcome == 'failure'
        run: |
          # Parse OCaml compiler errors into GitHub annotations
          python3 -c "
          import re, sys
          log = open('build.log').read()
          # Match: File \"path\", line N, characters C-C:
          for m in re.finditer(r'File \"([^\"]+)\", line (\d+), characters (\d+)-\d+:\n(.*?)(?=\nFile |\Z)', log, re.DOTALL):
              f, line, col, msg = m.groups()
              msg = msg.strip().replace('\n', ' ')
              level = 'error' if 'Error' in msg else 'warning'
              print(f'::{level} file={f},line={line},col={col}::{msg}')
          "

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5.4.0'
          dune-cache: true

      - name: Install dependencies
        run: opam install . --deps-only --with-test -y

      - name: Run tests
        run: opam exec -- dune runtest 2>&1 | tee test.log

      - name: Annotate test failures
        if: failure()
        run: |
          # Parse inline_test failures into annotations
          python3 -c "
          import re
          log = open('test.log').read()
          # Match: File \"path\", line N ...  FAILED
          for m in re.finditer(r'File \"([^\"]+)\", line (\d+).*?:\s*(.*?FAILED.*)', log):
              f, line, msg = m.groups()
              print(f'::error file={f},line={line}::{msg.strip()}')
          # Match: FAIL ... in file at line
          for m in re.finditer(r'FAIL\s+(.+?)\s+in\s+(\S+)\s+at\s+line\s+(\d+)', log):
              name, f, line = m.groups()
              print(f'::error file={f},line={line}::Test failed: {name}')
          "

  property-tests:
    name: Property Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5.4.0'
          dune-cache: true

      - name: Install dependencies
        run: opam install . --deps-only --with-test -y

      - name: Run property tests (10k iterations)
        run: opam exec -- dune runtest 2>&1 | tee proptest.log
        env:
          QCHECK_COUNT: "10000"

      - name: Annotate property test failures
        if: failure()
        run: |
          python3 -c "
          import re
          log = open('proptest.log').read()
          for m in re.finditer(r'File \"([^\"]+)\", line (\d+).*?:\s*(.*?fail.*)', log, re.IGNORECASE):
              f, line, msg = m.groups()
              print(f'::error file={f},line={line}::{msg.strip()}')
          "

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5.4.0'

      - uses: ocaml/setup-ocaml/lint-fmt@v3

  coverage:
    name: Coverage
    needs: test
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5.4.0'
          dune-cache: true

      - name: Install dependencies
        run: opam install . --deps-only --with-test bisect_ppx -y

      - name: Run tests with coverage
        run: |
          opam exec -- dune runtest --instrument-with bisect_ppx --force
          opam exec -- bisect-ppx-report summary

      - name: Generate coverage report
        run: |
          opam exec -- bisect-ppx-report html -o _coverage
          opam exec -- bisect-ppx-report summary --per-file | tee coverage-summary.txt

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: _coverage/coverage.json
          fail_ci_if_error: false
        continue-on-error: true

      - name: Post coverage summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('coverage-summary.txt', 'utf8');
            const body = `## Coverage Report\n\`\`\`\n${summary}\n\`\`\``;
            // Find existing coverage comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## Coverage Report'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        continue-on-error: true
