name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Pinned opam version — setup-ocaml resolves the *latest* opam release
# from GitHub and fails when that release has no pre-built binaries
# (e.g. opam 2.5.1 shipped source-only on 2026-04-15).  Installing
# opam manually lets us pin a known-good version with binaries.
# TODO: revert to setup-ocaml once it gains an opam-version input or
#       opam 2.5.1 publishes binaries.
env:
  OPAM_VERSION: "2.5.0"
  OCAML_VERSION: "5.4.0"
  OPAMYES: "1"
  OPAMCONFIRMLEVEL: "unsafe-yes"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install opam
        run: |
          sudo curl -fsSL "https://github.com/ocaml/opam/releases/download/${OPAM_VERSION}/opam-${OPAM_VERSION}-x86_64-linux" \
            -o /usr/local/bin/opam
          sudo chmod +x /usr/local/bin/opam

      - name: Cache opam root
        uses: actions/cache@v4
        with:
          path: ~/.opam
          key: opam-${{ env.OPAM_VERSION }}-${{ env.OCAML_VERSION }}-${{ hashFiles('*.opam') }}
          restore-keys: |
            opam-${{ env.OPAM_VERSION }}-${{ env.OCAML_VERSION }}-

      - name: Setup OCaml
        run: |
          opam init --auto-setup --bare --disable-sandboxing
          if ! opam switch list 2>/dev/null | grep -q default; then
            opam switch create default "ocaml-base-compiler.${OCAML_VERSION}"
          fi
          eval $(opam env)

      - name: Install dependencies
        run: opam install . --deps-only --with-test -y

      - name: Build
        id: build
        run: |
          opam exec -- dune build 2>&1 | tee build.log
          exit ${PIPESTATUS[0]}

      - name: Annotate build errors
        if: failure() && steps.build.outcome == 'failure'
        run: |
          # Parse OCaml compiler errors into GitHub annotations
          python3 -c "
          import re, sys
          log = open('build.log').read()
          # Match: File \"path\", line N, characters C-C:
          for m in re.finditer(r'File \"([^\"]+)\", line (\d+), characters (\d+)-\d+:\n(.*?)(?=\nFile |\Z)', log, re.DOTALL):
              f, line, col, msg = m.groups()
              msg = msg.strip().replace('\n', ' ')
              level = 'error' if 'Error' in msg else 'warning'
              print(f'::{level} file={f},line={line},col={col}::{msg}')
          "

      - name: Run tests
        run: opam exec -- dune runtest 2>&1 | tee test.log

      - name: Annotate test failures
        if: failure() && hashFiles('test.log') != ''
        run: |
          python3 -c "
          import re
          log = open('test.log').read()
          for m in re.finditer(r'File \"([^\"]+)\", line (\d+).*?:\s*(.*?FAILED.*)', log):
              f, line, msg = m.groups()
              print(f'::error file={f},line={line}::{msg.strip()}')
          for m in re.finditer(r'FAIL\s+(.+?)\s+in\s+(\S+)\s+at\s+line\s+(\d+)', log):
              name, f, line = m.groups()
              print(f'::error file={f},line={line}::Test failed: {name}')
          "

  property-tests:
    name: Property Tests (10k)
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install opam
        run: |
          sudo curl -fsSL "https://github.com/ocaml/opam/releases/download/${OPAM_VERSION}/opam-${OPAM_VERSION}-x86_64-linux" \
            -o /usr/local/bin/opam
          sudo chmod +x /usr/local/bin/opam

      - name: Cache opam root
        uses: actions/cache@v4
        with:
          path: ~/.opam
          key: opam-${{ env.OPAM_VERSION }}-${{ env.OCAML_VERSION }}-${{ hashFiles('*.opam') }}
          restore-keys: |
            opam-${{ env.OPAM_VERSION }}-${{ env.OCAML_VERSION }}-

      - name: Setup OCaml
        run: |
          opam init --auto-setup --bare --disable-sandboxing
          if ! opam switch list 2>/dev/null | grep -q default; then
            opam switch create default "ocaml-base-compiler.${OCAML_VERSION}"
          fi
          eval $(opam env)

      - name: Install dependencies
        run: opam install . --deps-only --with-test -y

      - name: Run property tests (10k iterations)
        run: opam exec -- dune runtest 2>&1 | tee proptest.log
        env:
          QCHECK_COUNT: "10000"

      - name: Annotate property test failures
        if: failure()
        run: |
          python3 -c "
          import re
          log = open('proptest.log').read()
          for m in re.finditer(r'File \"([^\"]+)\", line (\d+).*?:\s*(.*?fail.*)', log, re.IGNORECASE):
              f, line, msg = m.groups()
              print(f'::error file={f},line={line}::{msg.strip()}')
          "

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install opam
        run: |
          sudo curl -fsSL "https://github.com/ocaml/opam/releases/download/${OPAM_VERSION}/opam-${OPAM_VERSION}-x86_64-linux" \
            -o /usr/local/bin/opam
          sudo chmod +x /usr/local/bin/opam

      - name: Cache opam root (fmt)
        uses: actions/cache@v4
        with:
          path: ~/.opam
          key: opam-fmt-${{ env.OPAM_VERSION }}-${{ env.OCAML_VERSION }}-${{ hashFiles('.ocamlformat') }}
          restore-keys: |
            opam-fmt-${{ env.OPAM_VERSION }}-${{ env.OCAML_VERSION }}-

      - name: Setup OCaml
        run: |
          opam init --auto-setup --bare --disable-sandboxing
          if ! opam switch list 2>/dev/null | grep -q default; then
            opam switch create default "ocaml-base-compiler.${OCAML_VERSION}"
          fi
          eval $(opam env)

      - name: Install ocamlformat and dune
        run: |
          OCAMLFORMAT_VERSION=$(sed -n 's/^version *= *//p' .ocamlformat)
          opam install "ocamlformat=${OCAMLFORMAT_VERSION}" dune -y

      - name: Check formatting
        run: opam exec -- dune build @fmt
