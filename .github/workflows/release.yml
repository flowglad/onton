name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x86_64
            # macos-15-intel is GitHub's free, standard Intel/x86_64 image
            # (shipped 2025-09-19) — the supported replacement for the retired
            # macos-13. Unlike the paid macos-13-large larger runner (which
            # needs a >$0 Actions spending limit and otherwise queues forever),
            # this standard image provisions on public repos with no billing
            # setup. It's the last x86_64 macOS image GitHub offers; Intel
            # support ends when macOS 15 retires (~Fall 2027). Tracked in #316.
            runner: macos-15-intel
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # We deliberately do NOT cache [_opam/]. setup-ocaml@v3 caches its own
      # opam-root state at [~/.opam/]; caching the local switch alongside lets
      # the two drift — a stale [~/.opam/] without the switch registered makes
      # opam treat [_opam/] as a fresh switch and reinstall packages whose files
      # still exist on disk (the "zarith ... META already exists" failure). Worse
      # here: actions/cache freezes the first entry for a given `*.opam` hash, so
      # one half-consistent [_opam/] (e.g. from a cancelled run) poisons every
      # later run until the cache is manually evicted. See the build-and-test job
      # in ci.yml for the full rationale. [dune-cache: true] plus the
      # opam.ocaml.org archive mirror keep `opam install` fast without it.
      - uses: ocaml/setup-ocaml@e32b06a3e831ff2fbc6f08cf35be2085e3918014 # v3.6.1
        with:
          ocaml-compiler: '5.4.1'
          dune-cache: true

      - name: Use opam.ocaml.org archive cache
        # erratique.ch (upstream for cmdliner, mtime, fpath, logs, uutf, ...)
        # is frequently flaky; the community cache mirrors opam-repository
        # archives behind a CDN, so opam only falls back to upstream on a miss.
        run: opam option 'archive-mirrors=["https://opam.ocaml.org/cache"]'

      - name: Install dependencies
        # Near-noop on a `_opam` cache hit: every dep is already present in the
        # switch, so opam just re-resolves and exits.
        run: opam install . --deps-only --with-test -y

      - name: Build
        run: opam exec -- dune build bin/main.exe

      - name: Package binary
        run: |
          mkdir -p _dist/bin
          cp _build/default/bin/main.exe _dist/bin/onton
          tar czf onton-${{ matrix.arch }}-apple-darwin.tar.gz -C _dist/bin onton

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: onton-${{ matrix.arch }}-apple-darwin
          path: onton-${{ matrix.arch }}-apple-darwin.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            onton-arm64-apple-darwin.tar.gz \
            onton-x86_64-apple-darwin.tar.gz

  homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          merge-multiple: true

      - name: Compute SHA256 checksums
        id: sha
        run: |
          echo "arm64=$(shasum -a 256 onton-arm64-apple-darwin.tar.gz | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"
          echo "x86_64=$(shasum -a 256 onton-x86_64-apple-darwin.tar.gz | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - name: Generate and commit formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -e "s/VERSION/$VERSION/g" \
              -e "s/SHA256_ARM64/${{ steps.sha.outputs.arm64 }}/g" \
              -e "s/SHA256_X86_64/${{ steps.sha.outputs.x86_64 }}/g" \
              Formula/onton.rb.template > Formula/onton.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/onton.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Formula: onton ${GITHUB_REF_NAME}"
          git push origin main
