name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Cache opam switch
        id: cache-opam
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: _opam
          key: opam-macos-14-ocaml-5.4.0-${{ hashFiles('*.opam') }}

      - uses: ocaml/setup-ocaml@dec6499fef64fc5d7ed43d43a87251b7b1c306f5 # v3
        if: steps.cache-opam.outputs.cache-hit != 'true'
        with:
          ocaml-compiler: '5.4.0'
          dune-cache: true

      - name: Install dependencies
        if: steps.cache-opam.outputs.cache-hit != 'true'
        run: opam install . --deps-only --with-test -y

      - name: Build
        run: opam exec -- dune build bin/main.exe

      - name: Package binary
        run: |
          mkdir -p _dist/bin
          cp _build/default/bin/main.exe _dist/bin/onton
          GMP_PATH=$(otool -L _dist/bin/onton | grep libgmp | awk '{print $1}')
          if [ -n "$GMP_PATH" ] && [ "$GMP_PATH" != "/opt/homebrew/opt/gmp/lib/libgmp.10.dylib" ]; then
            install_name_tool -change "$GMP_PATH" /opt/homebrew/opt/gmp/lib/libgmp.10.dylib _dist/bin/onton
          fi
          tar czf onton-arm64-apple-darwin.tar.gz -C _dist/bin onton

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: onton-arm64-apple-darwin
          path: onton-arm64-apple-darwin.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            onton-arm64-apple-darwin.tar.gz

  homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          merge-multiple: true

      - name: Compute SHA256 checksums
        id: sha
        run: |
          echo "arm64=$(shasum -a 256 onton-arm64-apple-darwin.tar.gz | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate and commit formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -e "s/VERSION/$VERSION/g" \
              -e "s/SHA256_ARM64/${{ steps.sha.outputs.arm64 }}/g" \
              Formula/onton.rb.template > Formula/onton.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/onton.rb
          git commit -m "Formula: onton ${GITHUB_REF_NAME}"
          git push origin HEAD:main
