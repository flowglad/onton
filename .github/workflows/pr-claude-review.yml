name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    name: Claude Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    if: >-
      !github.event.pull_request.draft &&
      github.actor != 'dependabot[bot]' &&
      !github.event.pull_request.head.repo.fork
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Claude Code Review
        uses: anthropics/claude-code-action@cd77b50d2b0808657f8e6774085c8bf54484351c # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR for meaningful issues only:
            - Bugs, logic errors, missing edge cases
            - Security vulnerabilities
            - Performance problems
            - Incorrect OCaml patterns (missing exhaustive matches, unsafe casts, exception-heavy control flow)
            - Spec violations (check .pant spec if referenced in commit messages or PR description)

            Do NOT comment on:
            - Style, formatting, naming (ocamlformat handles this)
            - Missing docs or comments
            - Nitpicks that don't affect correctness

            Be concrete — suggest fixes, not just problems.
            Use inline comments for specific issues.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
